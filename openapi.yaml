openapi: 3.0.3

info:
  title: Expense Tracker API
  description: >
    API specification for the Expense Tracker application.
    This spec defines all data models, operations, and validation rules
    that the client-side implementation must follow.
  version: 1.0.0
  contact:
    name: Archisman Mitra

tags:
  - name: expenses
    description: Operations related to expense entries

paths:
  /expenses:
    get:
      tags: [expenses]
      summary: List all expenses
      operationId: listExpenses
      responses:
        "200":
          description: A list of all expense entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expense"
                  total:
                    type: number
                    format: float
                    description: Sum of all expense amounts
                    example: 1450.75
                required: [expenses, total]

    post:
      tags: [expenses]
      summary: Add a new expense
      operationId: createExpense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewExpense"
      responses:
        "201":
          description: Expense created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /expenses/{id}:
    delete:
      tags: [expenses]
      summary: Delete an expense by ID
      operationId: deleteExpense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Expense deleted successfully
        "404":
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Expense:
      type: object
      description: A recorded expense entry
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the expense
          example: "a3f1c2d4-12ab-4e56-8901-abcdef123456"
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: Short description of the expense
          example: "Lunch at cafe"
        amount:
          type: number
          format: float
          minimum: 0.01
          description: Amount spent in INR
          example: 250.00
        category:
          $ref: "#/components/schemas/Category"
        date:
          type: string
          format: date
          description: Date the expense was recorded (ISO 8601)
          example: "2025-05-26"
      required: [id, title, amount, category, date]

    NewExpense:
      type: object
      description: Payload to create a new expense (ID and date are server-generated)
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          example: "Auto ride to college"
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 80.00
        category:
          $ref: "#/components/schemas/Category"
      required: [title, amount, category]

    Category:
      type: string
      description: Expense category
      enum:
        - food
        - travel
        - shopping
        - health
        - other
      example: food

    Error:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed: amount must be greater than 0"
      required: [code, message]
