<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0e;
        --surface: #1a1a1a;
        --border: #2e2e2e;
        --accent: #c8f135;
        --danger: #ff4e4e;
        --text: #f0f0f0;
        --muted: #666;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", monospace;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
      }

      header {
        border-bottom: 3px solid var(--accent);
        padding-bottom: 1rem;
        margin-bottom: 2rem;
      }

      header h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(3rem, 10vw, 5.5rem);
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--accent);
      }

      header p {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .total-bar {
        background: var(--accent);
        color: #0e0e0e;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 500;
      }

      .total-bar .amount {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        letter-spacing: 0.05em;
      }

      .form-box {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }

      .form-title {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 1.2rem;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
        margin-bottom: 0.8rem;
      }

      .form-grid .full {
        grid-column: 1 / -1;
      }

      input,
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.7rem 0.9rem;
        font-family: "DM Mono", monospace;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.15s;
        -webkit-appearance: none;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
      }

      input::placeholder {
        color: var(--muted);
      }

      select option {
        background: #1a1a1a;
      }

      .btn-add {
        width: 100%;
        background: var(--accent);
        color: #0e0e0e;
        border: none;
        padding: 0.85rem;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }

      .btn-add:hover {
        opacity: 0.88;
      }
      .btn-add:active {
        transform: scale(0.99);
      }

      .list-header {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 0.8rem;
        display: flex;
        justify-content: space-between;
      }

      #expense-list {
        list-style: none;
      }

      .expense-item {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.2rem;
        border: 1px solid var(--border);
        margin-bottom: 0.5rem;
        background: var(--surface);
        animation: slideIn 0.2s ease;
        transition: border-color 0.15s;
      }

      .expense-item:hover {
        border-color: #444;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .expense-name {
        font-size: 0.9rem;
        font-weight: 500;
      }

      .expense-meta {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.2rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .category-tag {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.25rem 0.6rem;
        border: 1px solid;
        white-space: nowrap;
      }

      .cat-food {
        color: #f9a825;
        border-color: #f9a825;
      }
      .cat-travel {
        color: #4fc3f7;
        border-color: #4fc3f7;
      }
      .cat-shopping {
        color: #ce93d8;
        border-color: #ce93d8;
      }
      .cat-health {
        color: #80cbc4;
        border-color: #80cbc4;
      }
      .cat-other {
        color: #a0a0a0;
        border-color: #a0a0a0;
      }

      .expense-amount {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        color: var(--accent);
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .btn-delete {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.75rem;
        transition:
          border-color 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }

      .btn-delete:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 1px dashed var(--border);
      }

      .empty-state span {
        display: block;
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        color: #2a2a2a;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Expenses</h1>
        <p>Track where your money goes</p>
      </header>

      <div class="total-bar">
        <span>Total Spent</span>
        <span class="amount" id="total">₹0.00</span>
      </div>

      <div class="form-box">
        <p class="form-title">// Add Expense</p>
        <div class="form-grid">
          <input
            class="full"
            type="text"
            id="name"
            placeholder="Expense name"
          />
          <input
            type="number"
            id="amount"
            placeholder="Amount (₹)"
            min="0"
            step="0.01"
          />
          <select id="category">
            <option value="food">🍜 Food</option>
            <option value="travel">✈️ Travel</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="health">💊 Health</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <button class="btn-add" onclick="addExpense()">Add Expense</button>
      </div>

      <div class="list-header">
        <span>// Expense Log</span>
        <span id="count">0 entries</span>
      </div>

      <ul id="expense-list"></ul>
    </div>

    <script>
      let expenses = JSON.parse(localStorage.getItem("vibe_expenses") || "[]");

      function save() {
        localStorage.setItem("vibe_expenses", JSON.stringify(expenses));
      }

      function catClass(cat) {
        return "cat-" + cat;
      }

      function render() {
        const list = document.getElementById("expense-list");
        const total = expenses.reduce((s, e) => s + e.amount, 0);
        document.getElementById("total").textContent = "₹" + total.toFixed(2);
        document.getElementById("count").textContent =
          expenses.length + " entr" + (expenses.length === 1 ? "y" : "ies");

        if (expenses.length === 0) {
          list.innerHTML = `<div class="empty-state"><span>₹0</span>No expenses yet</div>`;
          return;
        }

        list.innerHTML = expenses
          .map(
            (e, i) => `
        <li class="expense-item">
          <div>
            <div class="expense-name">${e.name}</div>
            <div class="expense-meta">${e.date}</div>
          </div>
          <span class="category-tag ${catClass(e.category)}">${e.category}</span>
          <div style="display:flex;align-items:center;gap:0.6rem">
            <span class="expense-amount">₹${e.amount.toFixed(2)}</span>
            <button class="btn-delete" onclick="deleteExpense(${i})" title="Delete">✕</button>
          </div>
        </li>
      `,
          )
          .join("");
      }

      function addExpense() {
        const name = document.getElementById("name").value.trim();
        const amount = parseFloat(document.getElementById("amount").value);
        const category = document.getElementById("category").value;

        if (!name || isNaN(amount) || amount <= 0) {
          alert("Please enter a valid name and amount.");
          return;
        }

        expenses.unshift({
          name,
          amount,
          category,
          date: new Date().toLocaleDateString("en-IN", {
            day: "numeric",
            month: "short",
            year: "numeric",
          }),
        });

        save();
        render();

        document.getElementById("name").value = "";
        document.getElementById("amount").value = "";
      }

      function deleteExpense(index) {
        expenses.splice(index, 1);
        save();
        render();
      }

      render();
    </script>
  </body>
</html>
