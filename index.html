<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker — SDD</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f2ec;
        --surface: #ffffff;
        --border: #ddd8ce;
        --ink: #1a1a1a;
        --muted: #888;
        --accent: #2d5a27;
        --accent-light: #eaf2e8;
        --danger: #b94040;
        --tag-food: #7b4f12;
        --tag-travel: #1a4d6b;
        --tag-shopping: #5b2d8a;
        --tag-health: #1d6b5b;
        --tag-other: #555;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "IBM Plex Mono", monospace;
        min-height: 100vh;
        padding: 3rem 1.5rem;
      }

      .container {
        max-width: 700px;
        margin: 0 auto;
      }

      /* ── Header ── */
      header {
        margin-bottom: 2.5rem;
      }

      .spec-badge {
        display: inline-block;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: var(--accent);
        color: #fff;
        padding: 0.2rem 0.6rem;
        margin-bottom: 0.8rem;
      }

      header h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.8rem, 9vw, 5rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--ink);
      }

      header h1 span {
        color: var(--accent);
      }

      .subtitle {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      /* ── Total ── */
      .total-card {
        border: 2px solid var(--ink);
        padding: 1.2rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 2rem;
        background: var(--surface);
      }

      .total-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .total-label code {
        display: block;
        font-size: 0.6rem;
        color: var(--accent);
        margin-top: 0.15rem;
      }

      .total-value {
        font-family: "Playfair Display", serif;
        font-size: 2.5rem;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      /* ── Form ── */
      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }

      .section-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
        margin-bottom: 1.2rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .field {
        margin-bottom: 1rem;
      }

      .field label {
        display: block;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .field label code {
        color: var(--accent);
        font-size: 0.6rem;
      }

      input,
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--ink);
        padding: 0.65rem 0.9rem;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.15s;
        -webkit-appearance: none;
        border-radius: 0;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
      }
      input::placeholder {
        color: #bbb;
      }

      .field-error {
        font-size: 0.65rem;
        color: var(--danger);
        margin-top: 0.3rem;
        display: none;
      }

      .field-error.visible {
        display: block;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .btn-submit {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.85rem;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.15s;
      }

      .btn-submit:hover {
        background: #214420;
      }

      /* ── List ── */
      .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.8rem;
      }

      .list-count {
        font-size: 0.65rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #expense-list {
        list-style: none;
      }

      .expense-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        padding: 1rem 1.2rem;
        margin-bottom: 0.5rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 1rem;
        align-items: center;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .expense-title {
        font-size: 0.9rem;
        font-weight: 500;
      }

      .expense-meta {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 0.3rem;
        display: flex;
        gap: 0.8rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .expense-meta code {
        font-size: 0.55rem;
        color: #bbb;
      }

      .category-badge {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.15rem 0.5rem;
        border: 1px solid currentColor;
      }

      .cat-food {
        color: var(--tag-food);
      }
      .cat-travel {
        color: var(--tag-travel);
      }
      .cat-shopping {
        color: var(--tag-shopping);
      }
      .cat-health {
        color: var(--tag-health);
      }
      .cat-other {
        color: var(--tag-other);
      }

      .expense-right {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .expense-amount {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: var(--ink);
        white-space: nowrap;
      }

      .btn-delete {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        width: 26px;
        height: 26px;
        font-size: 0.7rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          border-color 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }

      .btn-delete:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .empty-state {
        border: 1px dashed var(--border);
        padding: 3rem 1rem;
        text-align: center;
      }

      .empty-state p {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .empty-state code {
        display: block;
        font-size: 0.6rem;
        color: #bbb;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="spec-badge">OpenAPI 3.0 · SDD</div>
        <h1>Expense<br /><span>Tracker</span></h1>
        <p class="subtitle">
          Implementation follows openapi.yaml specification
        </p>
      </header>

      <!-- Total — maps to GET /expenses → response.total -->
      <div class="total-card">
        <div class="total-label">
          Total Spent
          <code>GET /expenses → total</code>
        </div>
        <div class="total-value" id="total">₹0.00</div>
      </div>

      <!-- Form — maps to POST /expenses (NewExpense schema) -->
      <div class="form-card">
        <div class="section-label">POST /expenses · NewExpense</div>

        <div class="field">
          <label>title <code>string · required · max 100</code></label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Lunch at canteen"
            maxlength="100"
          />
          <div class="field-error" id="err-title">
            Title is required (min 1 character)
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>amount <code>number · required · min 0.01</code></label>
            <input
              type="number"
              id="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <div class="field-error" id="err-amount">
              Amount must be greater than 0
            </div>
          </div>

          <div class="field">
            <label>category <code>enum · required</code></label>
            <select id="category">
              <option value="food">food</option>
              <option value="travel">travel</option>
              <option value="shopping">shopping</option>
              <option value="health">health</option>
              <option value="other">other</option>
            </select>
          </div>
        </div>

        <button class="btn-submit" onclick="createExpense()">
          Create Expense
        </button>
      </div>

      <!-- List — maps to GET /expenses → expenses[] -->
      <div class="list-header">
        <div class="section-label" style="margin-bottom: 0; flex: 1">
          GET /expenses → expenses[]
        </div>
        <span class="list-count" id="count">0 records</span>
      </div>

      <ul id="expense-list"></ul>
    </div>

    <script>
      /**
       * Client-side store.
       * Data shape follows the Expense schema defined in openapi.yaml:
       *   id:       string (uuid)      — crypto.randomUUID()
       *   title:    string             — from input #title
       *   amount:   number             — from input #amount
       *   category: Category (enum)    — from select #category
       *   date:     string (ISO 8601)  — new Date().toISOString().split('T')[0]
       */
      let expenses = JSON.parse(localStorage.getItem("sdd_expenses") || "[]");

      function save() {
        localStorage.setItem("sdd_expenses", JSON.stringify(expenses));
      }

      // Validate against NewExpense schema constraints
      function validate(title, amount) {
        let valid = true;

        // title: minLength 1, maxLength 100
        const titleErr = document.getElementById("err-title");
        if (!title || title.length < 1) {
          titleErr.classList.add("visible");
          valid = false;
        } else {
          titleErr.classList.remove("visible");
        }

        // amount: minimum 0.01
        const amountErr = document.getElementById("err-amount");
        if (isNaN(amount) || amount < 0.01) {
          amountErr.classList.add("visible");
          valid = false;
        } else {
          amountErr.classList.remove("visible");
        }

        return valid;
      }

      // POST /expenses — createExpense operation
      function createExpense() {
        const title = document.getElementById("title").value.trim();
        const amount = parseFloat(document.getElementById("amount").value);
        const category = document.getElementById("category").value;

        if (!validate(title, amount)) return;

        // Construct object matching the Expense schema
        const expense = {
          id: crypto.randomUUID(), // string, format: uuid
          title, // string, minLength:1, maxLength:100
          amount: Math.round(amount * 100) / 100, // number, float, minimum: 0.01
          category, // Category enum
          date: new Date().toISOString().split("T")[0], // string, format: date
        };

        expenses.unshift(expense);
        save();
        render();

        document.getElementById("title").value = "";
        document.getElementById("amount").value = "";
      }

      // DELETE /expenses/{id} — deleteExpense operation
      function deleteExpense(id) {
        expenses = expenses.filter((e) => e.id !== id);
        save();
        render();
      }

      // GET /expenses — listExpenses operation
      // Returns: { expenses: Expense[], total: number }
      function listExpenses() {
        const total = expenses.reduce((sum, e) => sum + e.amount, 0);
        return { expenses, total: Math.round(total * 100) / 100 };
      }

      function render() {
        const { expenses: list, total } = listExpenses();

        document.getElementById("total").textContent = "₹" + total.toFixed(2);
        document.getElementById("count").textContent =
          list.length + " record" + (list.length !== 1 ? "s" : "");

        const ul = document.getElementById("expense-list");

        if (list.length === 0) {
          ul.innerHTML = `
          <div class="empty-state">
            <p>No expense records</p>
            <code>expenses[] is empty · POST /expenses to add one</code>
          </div>`;
          return;
        }

        ul.innerHTML = list
          .map(
            (e) => `
        <li class="expense-item">
          <div>
            <div class="expense-title">${e.title}</div>
            <div class="expense-meta">
              <span class="category-badge cat-${e.category}">${e.category}</span>
              <span>${e.date}</span>
              <code>id: ${e.id.slice(0, 8)}…</code>
            </div>
          </div>
          <div class="expense-right">
            <span class="expense-amount">₹${e.amount.toFixed(2)}</span>
            <button class="btn-delete" onclick="deleteExpense('${e.id}')" title="DELETE /expenses/${e.id}">✕</button>
          </div>
        </li>
      `,
          )
          .join("");
      }

      render();
    </script>
  </body>
</html>
