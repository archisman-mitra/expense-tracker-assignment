<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker — SDD</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="spec-badge">OpenAPI 3.0 · SDD</div>
        <h1>Expense<br /><span>Tracker</span></h1>
        <p class="subtitle">
          Implementation follows openapi.yaml specification
        </p>
      </header>

      <!-- Total — maps to GET /expenses → response.total -->
      <div class="total-card">
        <div class="total-label">
          Total Spent
          <code>GET /expenses → total</code>
        </div>
        <div class="total-value" id="total">₹0.00</div>
      </div>

      <!-- Form — maps to POST /expenses (NewExpense schema) -->
      <div class="form-card">
        <div class="section-label">POST /expenses · NewExpense</div>

        <div class="field">
          <label>title <code>string · required · max 100</code></label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Lunch at canteen"
            maxlength="100"
          />
          <div class="field-error" id="err-title">
            Title is required (min 1 character)
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>amount <code>number · required · min 0.01</code></label>
            <input
              type="number"
              id="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <div class="field-error" id="err-amount">
              Amount must be greater than 0
            </div>
          </div>

          <div class="field">
            <label>category <code>enum · required</code></label>
            <select id="category">
              <option value="food">food</option>
              <option value="travel">travel</option>
              <option value="shopping">shopping</option>
              <option value="health">health</option>
              <option value="other">other</option>
            </select>
          </div>
        </div>

        <button class="btn-submit" onclick="createExpense()">
          Create Expense
        </button>
      </div>

      <!-- List — maps to GET /expenses → expenses[] -->
      <div class="list-header">
        <div class="section-label" style="margin-bottom: 0; flex: 1">
          GET /expenses → expenses[]
        </div>
        <span class="list-count" id="count">0 records</span>
      </div>

      <ul id="expense-list"></ul>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
